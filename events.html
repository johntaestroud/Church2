
<!DOCTYPE html>
<html lang="en" >

<head>
  <meta charset="UTF-8">
  
 <link rel="shortcut icon" href="favicon/favicon.ico?raw=true" type="image/x-icon">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"> 

  <title>Church of God | Events</title>
  <link rel='stylesheet' href='https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0-alpha.6/css/bootstrap.min.css'>
  <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css'>
  
<style>
    :root {
	--dark-blue: hsl(213, 92%, 15%);
	--logo-red: hsla(1, 100%, 50%, 0.884);
	--white-sand: hsl(40, 7%, 92%);
	--black: hsl(234, 14%, 14%);
	--gold-sp-color: hsl(18, 22%, 61%);
	--light: hsl(33, 26%, 92%);
}
@font-face {
  font-family: 'Source Sans Pro';
  font-style: normal;
  font-weight: 400;
  src: url(https://fonts.gstatic.com/s/sourcesanspro/v23/6xK3dSBYKcSV-LCoeQqfX1RYOo3qOK7g.ttf) format('truetype');
}
@font-face {
  font-family: 'Varela Round';
  font-style: normal;
  font-weight: 400;
  src: url(https://fonts.gstatic.com/s/varelaround/v21/w8gdH283Tvk__Lua32TysjIfp8uK.ttf) format('truetype');
}

.page-event {
  background-color: var(--dark-blue);
  padding-bottom: 40px;
  font-family: "Varela Round", sans-serif;
}
.page-event .cover {
  height: 360px;
  /* background-image: url('image/church.png'); */
  background-position: center center;
  background-size: cover;
}
.page-event .cover .heading {
  font-family: 'Telefon Black';
  font-size: 243px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  text-align: center;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  color: #ccc;
  transition: font-size 0.3s;
}
.page-event .cover .heading::first-letter {
  color: var(--logo-red);
}
.page-event .upcoming-sec {
  padding: 5vh 0;
  border-bottom: 1px solid #ccc;
}
.page-event .upcoming-sec .heading {
  font-size: 30px;
  color: #fff;
}
.page-event .upcoming-event-list {
  color: #ccc;
}
.page-event .upcoming-event-list .event-block {
  padding: 5vh 0;
  border-bottom: 1px solid #ccc;
}
.page-event .upcoming-event-list .event-block .sec-1,
.page-event .upcoming-event-list .event-block .sec-2 {
  padding-bottom: 3vh;
}
.page-event .upcoming-event-list .event-block .sec-1 table .month {
  text-transform: uppercase;
  color: var(--logo-red);
  font-size: 30px;
}
.page-event .upcoming-event-list .event-block .sec-1 table .month-date-devider {
  width: 5vh;
  margin: 1vh 0;
  background-color: #3cbfaf;
  height: 5px;
}
.page-event .upcoming-event-list .event-block .sec-1 table .date {
  font-size: 60px;
  font-weight: bolder;
  line-height: normal;
}
.page-event .upcoming-event-list .event-block .sec-1 table .title {
  padding-left: 20px;
  vertical-align: top;
  font-size: 30px;
}
.page-event .upcoming-event-list .event-block .sec-2 img {
  width: 100%;
}
.page-event .upcoming-event-list .event-block .sec-3 .title {
  font-size: 30px;
  padding-bottom: 2vh;
}
.page-event .upcoming-event-list .event-block .sec-3 .venue table td {
  vertical-align: top;
}
.page-event .upcoming-event-list .event-block .sec-3 .venue table td i {
  color: var(--logo-red);
  padding-left: 3px;
  padding-right: 10px;
}
.page-event .upcoming-event-list .event-block .sec-3 .venue table td .dim-color a {
  color: rgba(204, 204, 204, 0.3);
}
.page-event .upcoming-event-list .event-block .sec-3 .time {
  padding-bottom: 3vh;
}
.page-event .upcoming-event-list .event-block .sec-3 .time table td {
  vertical-align: top;
}
.page-event .upcoming-event-list .event-block .sec-3 .time table td i {
  color: var(--logo-red);
  padding-right: 10px;
}
.page-event .upcoming-event-list .event-block .sec-3 .time table td .dim-color {
  color: rgba(204, 204, 204, 0.3);
}
.page-event .upcoming-event-list .event-block .sec-3 .sort-story {
  -webkit-box-orient: vertical;
  display: -webkit-box;
  overflow: hidden;
}
.page-event .upcoming-event-list .event-block .sec-3 .group-of-btn {
  padding-top: 3vh;
}
.page-event .upcoming-event-list .event-block .sec-3 .group-of-btn .book-ticket {
  background-color: #3cbfaf;
  color: #fff;
  margin-bottom: 10px;
}
.page-event .page-heading {
  text-transform: uppercase;
  color: #fff;
  padding-bottom: 17px;
  word-break: break-all;
  padding: 10px;
}
.page-event .page-heading::first-letter {
  color: var(--logo-red);
}
@media (min-width: 992px) {
  .upcoming-event-list .event-block .sec-1 table .title {
    display: none;
  }
}
@media (max-width: 991px) {
  .page-event .cover .heading {
    font-size: 180px;
    padding-top: 7vh;
  }
  .upcoming-event-list .event-block .sec-3 .title {
    display: none;
  }
}
@media (max-width: 767px) {
  .page-event .cover .heading {
    font-size: 140px;
    padding-top: 11vh;
  }
}
@media (max-width: 575px) {
  .page-event .cover {
    height: 214px;
  }
  .page-event .cover .heading {
    font-size: 70px;
  }
  .page-event .upcoming-event-list .event-block .sec-1 table .month {
    font-size: 14px;
  }
  .page-event .upcoming-event-list .event-block .sec-1 table .date {
    font-size: 36px;
  }
  .page-event .upcoming-event-list .event-block .sec-1 table .title {
    padding-left: 20px;
    font-size: 20px;
    vertical-align: top;
  }
}
</style>
  
</head>

<body translate="no">
  <div class="page-event">
  <div class="cover">
    <div class="heading"></div>
  </div>
  <div class="container">
    <div class="upcoming-sec">
      <div class="heading">Upcoming Events</div>
    </div>
    <div class="upcoming-event-list">
      <div class="event-block">
        <div class="row">
          <div class="col-lg-2 sec-1">
            <table>
              <tr>
                <td>
                  <div class="month">Apr</div>
                  <div class="month-date-devider"></div>
                  <div class="date">26</div>
                </td>
                <td class="title">Family Day</td>
              </tr>
            </table>
          </div>
          <div class="col-lg-5 sec-2">
            <img src="https://placehold.co/600x400" />
          </div>
          <div class="col-lg-5 sec-3">
            <div class="title">Family Day - Church of God</div>
            <div class="venue">
              <table>
                <tr>
                  <td><i class="fa fa-map-marker"></i></td>
                  <td>
                    <div>1901 62nd Avenue S, Saint Petersburg, FL</div>
                    <div class="dim-color">
                      <a href="https://www.google.co.in" target="blank">Get Directions</a>
                    </div>
                  </td>
                </tr>
              </table>
            </div>
            <div class="time">
              <table>
                <tr>
                  <td><i class="fa fa-clock-o"></i></td>
                  <td>
                    <div>Sunday, Apr 26, 2026 at 12:00 PM</div>
                    <div data-livestamp="2026-04-26T12:00:00Z" class="dim-color"></div>
                  </td>
                </tr>
              </table>
            </div>
            <div class="sort-story">"testing</div>
            <div class="group-of-btn">
              <a href="https://www.google.com" target="blank" class="btn book-ticket">Homepage</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
  <script src='https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js'></script>
<script src='https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.20.1/moment.min.js'></script>
<script src='https://cdnjs.cloudflare.com/ajax/libs/livestamp/1.1.2/livestamp.min.js'></script>
  
  
</body>

</html>
